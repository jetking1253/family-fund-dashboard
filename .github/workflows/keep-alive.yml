name: 🔄 Keep Alive - Prevent Supabase Pause

on:
  # 每30天自动执行一次（UTC时间每月1号和15号 02:00）
  schedule:
    - cron: '0 2 1,15 * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Supabase & Streamlit
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Ping Supabase REST API (nav_history表)
        run: |
          echo "⏰ 执行时间: $(date)"
          echo "🔍 正在查询 Supabase 数据库以保持活跃状态..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "📊 Supabase 响应状态码: $RESPONSE"
          
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase 数据库响应正常，活跃状态已维持！"
          else
            echo "⚠️ Supabase 响应异常，状态码: $RESPONSE"
            exit 1
          fi

      - name: 🌐 Ping Streamlit App
        run: |
          echo "🌐 正在唤醒 Streamlit 应用..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://family-fund-dashboard-hp9yfow8uxrdsgnkrwcefz.streamlit.app/")
          
          echo "📊 Streamlit 响应状态码: $RESPONSE"
          
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "302" ]; then
            echo "✅ Streamlit 应用已唤醒！"
          else
            echo "ℹ️ Streamlit 返回状态码 $RESPONSE（可能正在启动，不影响 Supabase 保活）"
          fi

      - name: 📋 保活任务完成
        run: |
          echo "🎉 保活任务完成！"
          echo "📅 下次执行时间: 约30天后"
          echo "🔗 Supabase: https://ydianwsjajqnessckfuw.supabase.co"
          echo "🔗 Streamlit: https://family-fund-dashboard-hp9yfow8uxrdsgnkrwcefz.streamlit.app/"
