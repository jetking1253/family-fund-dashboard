name: 🔄 Keep Alive - Prevent Supabase Pause

on:
  schedule:
    - cron: '0 2 1,15 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Streamlit
    runs-on: ubuntu-latest
    steps:
      - name: 🌐 Ping Streamlit App
        run: |
          echo "🌐 正在唤醒 Streamlit 应用..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://family-fund-dashboard-hp9yfow8uxrdsgnkrwcefz.streamlit.app/")
          echo "📊 Streamlit 响应状态码: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "302" ] || [ "$RESPONSE" = "303" ] || [ "$RESPONSE" = "403" ]; then
            echo "✅ Streamlit 应用已唤醒！(连带唤醒后台 Supabase)"
          else
            echo "ℹ️ Streamlit 返回状态码 $RESPONSE"
            exit 1
          fi
